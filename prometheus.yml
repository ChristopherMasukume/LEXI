global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'windows'
    static_configs:
      - targets: ['host.docker.internal:9182']

  - job_name: 'my-local-machine'
    scrape_interval: 15s
    static_configs:
      - targets: ['10.1.8.184:9100']
